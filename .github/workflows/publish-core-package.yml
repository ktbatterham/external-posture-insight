name: Publish Core Package

on:
  workflow_dispatch:
  push:
    tags:
      - "core-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: |
          npm run build:core
          npm run test:core

      - name: NPM identity check
        run: |
          npm whoami
          npm view @ktbatterham/external-posture-core version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish core package
        run: npm publish ./packages/core --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
