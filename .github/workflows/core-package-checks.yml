name: Core Package Checks

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core package
        run: npm run build:core

      - name: Run core tests
        run: npm run test:core

      - name: Lint repo
        run: npm run lint

      - name: Build app
        run: npm run build

      - name: Package dry run
        run: npm pack --dry-run ./packages/core
